name: neom_camera
description: Camera functionality for Open Neom
version: 1.3.0
homepage: https://github.com/Cyberneom/neom_camera
publish_to: 'none'

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  neom_core:
    git:
      url: git@github.com:Cyberneom/neom_core.git
  neom_commons:
    git:
      url: git@github.com:Cyberneom/neom_commons.git

  camera: ^0.11.1
  image: ^4.1.7

  # For horizontal flip of front camera videos
  easy_video_editor: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
